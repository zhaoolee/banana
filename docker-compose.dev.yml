services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:23001
      VITE_USE_POLLING: "true"
    volumes:
      - .:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend.dev
    ports:
      - "23001:23001"
    environment:
      GEMINI_AUTH_MODE: vertex-adc
      GOOGLE_APPLICATION_CREDENTIALS: /app/.config/gcloud/application_default_credentials.json
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
      PORT: "23001"
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
      - ${HOME}/.config/gcloud/application_default_credentials.json:/app/.config/gcloud/application_default_credentials.json:ro

volumes:
  frontend_node_modules:
  backend_node_modules:
